<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESP32 IoT Dashboard</title>
  <!-- Modern Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.7);
      --text: #f8fafc;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --danger: #ef4444;
      --danger-hover: #dc2626;
    }
    
    body {
      margin: 0;
      font-family: 'Outfit', sans-serif;
      background: radial-gradient(circle at 15% 50%, #1e1b4b, var(--bg) 60%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .dashboard {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 40px;
      width: min(400px, 100%);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      text-align: center;
      transition: transform 0.3s ease;
    }

    .dashboard:hover {
      transform: translateY(-5px);
    }

    h1 {
      margin: 0 0 5px 0;
      font-weight: 500;
      font-size: 18px;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .status {
      font-size: 13px;
      color: #10b981;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 30px;
    }

    .status::before {
      content: "";
      width: 8px;
      height: 8px;
      background: #10b981;
      border-radius: 50%;
      box-shadow: 0 0 10px #10b981;
    }
    
    .status.offline { color: #f43f5e; }
    .status.offline::before { background: #f43f5e; box-shadow: 0 0 10px #f43f5e; }

    .counter-circle {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle at top left, rgba(59, 130, 246, 0.2), transparent);
      border: 2px solid rgba(59, 130, 246, 0.4);
      margin: 0 auto 30px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      box-shadow: 0 0 30px rgba(59, 130, 246, 0.2);
    }

    .counter-value {
      font-size: 64px;
      font-weight: 700;
      line-height: 1;
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
      transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    
    .counter-value.pop {
      transform: scale(1.2);
      color: #60a5fa;
    }

    .counter-label {
      font-size: 12px;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 5px;
    }

    .controls h2 {
      font-size: 14px;
      color: #cbd5e1;
      font-weight: 500;
      margin-bottom: 15px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding-bottom: 10px;
    }

    .buttons {
      display: flex;
      gap: 15px;
      justify-content: center;
    }

    button {
      flex: 1;
      border: none;
      padding: 14px;
      border-radius: 12px;
      font-family: inherit;
      font-weight: 600;
      font-size: 15px;
      color: white;
      cursor: pointer;
      isolation: isolate;
      position: relative;
      overflow: hidden;
      transition: 0.2s ease;
    }

    button::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(rgba(255,255,255,0.1), transparent);
      z-index: -1;
    }

    button.on {
      background-color: var(--accent);
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
    }

    button.on:hover { background-color: var(--accent-hover); transform: translateY(-2px); }
    button.on:active { transform: scale(0.96); }

    button.off {
      background-color: var(--danger);
      box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
    }
    
    button.off:hover { background-color: var(--danger-hover); transform: translateY(-2px); }
    button.off:active { transform: scale(0.96); }

  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
  <script defer src="dashboard.js"></script>
</head>
<body>

  <main class="dashboard">
    <h1>IoT Dashboard</h1>
    <div id="status" class="status offline">Broker Disconnected</div>

    <div class="counter-circle">
      <div class="counter-value" id="counterValue">0</div>
      <div class="counter-label">Presses</div>
    </div>

    <div class="controls">
      <h2>ESP32 LED Control</h2>
      <div class="buttons">
        <button class="on" id="btnOn">TURN ON</button>
        <button class="off" id="btnOff">TURN OFF</button>
      </div>
    </div>
  </main>

</body>
</html>
