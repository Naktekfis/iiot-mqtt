<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MQTT Browser Chat</title>
  <style>
    :root {
      --bg: #f3f6f9;
      --card: #ffffff;
      --text: #142033;
      --muted: #5f6c80;
      --accent: #1d7ae7;
      --accent-dark: #155db1;
      --line: #d9e0ea;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top right, #dbeafe 0%, var(--bg) 50%);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .chat {
      width: min(780px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(17, 38, 66, 0.1);
      overflow: hidden;
    }

    .header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .title {
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .status {
      font-size: 13px;
      color: var(--muted);
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfe;
    }

    .field {
      display: grid;
      gap: 4px;
    }

    .field label {
      font-size: 12px;
      color: var(--muted);
    }

    .field input {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 10px;
      font-size: 14px;
      outline: none;
    }

    .messages {
      height: 360px;
      overflow-y: auto;
      padding: 14px 16px;
      background: #f9fbff;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .bubble {
      max-width: 76%;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.3;
      word-break: break-word;
    }

    .bubble.me {
      align-self: flex-end;
      background: var(--accent);
      color: white;
    }

    .bubble.other {
      align-self: flex-start;
      background: white;
      border: 1px solid var(--line);
    }

    .meta {
      display: block;
      margin-top: 4px;
      font-size: 11px;
      opacity: 0.8;
    }

    .compose {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      padding: 12px 16px 16px;
    }

    .compose input {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 11px 12px;
      font-size: 14px;
      outline: none;
    }

    .compose button {
      border: none;
      border-radius: 8px;
      padding: 0 18px;
      background: var(--accent);
      color: white;
      font-weight: 600;
      cursor: pointer;
    }

    .compose button:hover {
      background: var(--accent-dark);
    }

    @media (max-width: 720px) {
      .controls {
        grid-template-columns: 1fr;
      }

      .bubble {
        max-width: 90%;
      }
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
  <script defer src="chat.js"></script>
</head>
<body>
  <main class="chat">
    <div class="header">
      <div class="title">MQTT Browser Chat</div>
      <div class="status" id="status">Disconnected</div>
    </div>

    <section class="controls">
      <div class="field">
        <label for="nickname">Nickname</label>
        <input id="nickname" value="user" maxlength="24">
      </div>
      <div class="field">
        <label for="topic">Topic</label>
        <input id="topic" value="chat/room-1" maxlength="64">
      </div>
    </section>

    <section class="messages" id="messages"></section>

    <form class="compose" id="composeForm">
      <input id="messageInput" autocomplete="off" placeholder="Type message..." maxlength="256">
      <button type="submit">Send</button>
    </form>
  </main>
</body>
</html>
